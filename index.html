const {useState,useEffect,useRef,Component}=React;

// ─── FIX #4: AudioContext reutilizado — evita limite de 6 instâncias no iOS Safari ─
let _audioCtx=null;
function getAudioCtx(){
  try{
    if(!_audioCtx||_audioCtx.state==="closed"){
      _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    }
    return _audioCtx;
  }catch{return null;}
}
function beep(freq=880,dur=150,vol=0.35){
  try{
    const ctx=getAudioCtx();if(!ctx)return;
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;g.gain.value=vol;
    o.start(ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);
    o.stop(ctx.currentTime+dur/1000+0.05);
  }catch{}
}
// Inicializa AudioContext no primeiro toque do usuário (requisito iOS)
document.addEventListener("touchstart",()=>{try{getAudioCtx()?.resume();}catch{}},{once:true,passive:true});

// ─── FIX #5: Error Boundary para evitar tela branca em crashes ────────────────
class ErrorBoundary extends Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err){
      return(
        <div className="err-screen">
          <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
          <div style={{fontFamily:"Bebas Neue",fontSize:28,letterSpacing:2,color:"var(--acc)",marginBottom:8}}>Algo deu errado</div>
          <div style={{fontSize:13,color:"var(--mu)",marginBottom:24,lineHeight:1.6}}>{String(this.state.err.message||"Erro desconhecido")}</div>
          <button onClick={()=>{this.setState({err:null});window.location.reload();}}
            style={{padding:"14px 28px",borderRadius:12,border:"none",background:"var(--acc)",color:"#000",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"DM Sans"}}>
            Recarregar App
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── FIX #6: useLS — usa functional update para evitar stale state ────────────
function useLS(k,init){
  const[v,sv]=useState(()=>{
    try{const s=localStorage.getItem(k);return s!==null?JSON.parse(s):init;}catch{return init;}
  });
  const set=val=>{
    // FIX: usa setState funcional para garantir que sempre opera sobre o valor mais recente
    sv(prev=>{
      const n=typeof val==="function"?val(prev):val;
      try{localStorage.setItem(k,JSON.stringify(n));}catch{}
      return n;
    });
  };
  return[v,set];
}

const lsDel=(k)=>{try{localStorage.removeItem(k);}catch{}};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const rm1=(reps,kg)=>reps===1?kg:Math.round(kg*(1+reps/30));
const suggest=logs=>{
  if(!logs?.length)return null;
  const l=logs[0];if(!l.sets?.length)return null;
  const maxed=l.sets.every(s=>parseInt(s.r||0)>=12);
  if(maxed&&l.sets[0].kg)return`Bateu 12 reps! Tente ${(parseFloat(l.sets[0].kg)+2.5).toFixed(1)}kg hoje 💪`;
  return`Última: ${l.sets.map(s=>`${s.r||"?"}×${s.kg||"?"}kg`).join(" · ")}`;
};

// ─── TOAST ────────────────────────────────────────────────────────────────────
function Toast({msg,show,err}){
  return<div style={{position:"fixed",top:20,left:"50%",transform:`translateX(-50%) translateY(${show?0:-90}px)`,background:err?"var(--red)":"var(--acc)",color:err?"#fff":"#000",padding:"11px 20px",borderRadius:12,fontWeight:700,fontSize:14,zIndex:99999,transition:"transform .4s cubic-bezier(.34,1.56,.64,1)",whiteSpace:"nowrap",maxWidth:"88vw",textAlign:"center",pointerEvents:"none"}}>{msg}</div>;
}

// ─── REST TIMER — portal para evitar z-index ──────────────────────────────────
function RestTimer({sec,onDone,onSkip}){
  const[left,setLeft]=useState(sec);
  const circ=2*Math.PI*54;
  // FIX: beep no fim do timer
  useEffect(()=>{
    if(left<=0){beep(440,200);onDone();return;}
    if(left<=3&&left>0)beep(660,80);
    const t=setTimeout(()=>setLeft(l=>l-1),1000);
    return()=>clearTimeout(t);
  },[left]);
  const col=left<=10?"#ff4d4d":left<=30?"#ffaa00":"#c8f135";
  const dash=circ*(left/sec);
  return ReactDOM.createPortal(
    <div className="timer-ov" onClick={e=>e.stopPropagation()}>
      <div style={{fontFamily:"Space Mono",fontSize:10,color:"var(--mu)",letterSpacing:3,textTransform:"uppercase",marginBottom:24}}>⏱ Descanso entre séries</div>
      <div className="tabata-ring">
        <svg style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}} viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="54" fill="none" stroke="#1a1a1a" strokeWidth="7"/>
          <circle cx="60" cy="60" r="54" fill="none" stroke={col} strokeWidth="7"
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{transition:"stroke-dasharray .95s linear,stroke .4s"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"Bebas Neue",fontSize:72,color:col,lineHeight:1,letterSpacing:2}}>{fmt(left)}</div>
          <div style={{fontSize:10,color:"var(--mu)",fontFamily:"Space Mono",letterSpacing:2}}>restantes</div>
        </div>
      </div>
      <div style={{display:"flex",gap:10,width:260}}>
        <button onClick={()=>setLeft(l=>l+15)} style={{flex:1,padding:14,borderRadius:12,border:"1px solid var(--br)",background:"var(--s2)",color:"var(--tx)",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"DM Sans"}}>+15s</button>
        <button onClick={onSkip} style={{flex:2,padding:14,borderRadius:12,border:"none",background:col,color:"#000",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"DM Sans"}}>Pular ▶</button>
      </div>
    </div>,
    document.body
  );
}

// ─── TABATA SCREEN ────────────────────────────────────────────────────────────
function TabataScreen({onBack,onFinish,goTab}){
  const WORK=20,REST=10,ROUNDS=3,ROUND_REST=120;
  const[phase,setPhase]=useState("intro");
  const[round,setRound]=useState(1);
  const[exIdx,setExIdx]=useState(0);
  const[left,setLeft]=useState(WORK);
  const[totalTime,setTotalTime]=useState(0);

  // FIX #7: exIdx com guard de bounds para evitar crash
  const safeIdx=Math.min(Math.max(exIdx,0),TABATA_EX.length-1);
  const ex=TABATA_EX[safeIdx];
  const nextEx=TABATA_EX[(safeIdx+1)%TABATA_EX.length];

  // FIX #8: totalTime interval — limpa corretamente em TODOS os estados incluindo "done"
  useEffect(()=>{
    if(phase==="work"||phase==="rest"||phase==="roundRest"){
      const t=setInterval(()=>setTotalTime(s=>s+1),1000);
      return()=>clearInterval(t);
    }
    // Se virou "done" ou "intro", nada roda — cleanup já foi feito
  },[phase]);

  // FIX #9: stale closure — exIdx e round adicionados ao array de deps
  useEffect(()=>{
    if(phase==="intro"||phase==="done")return;
    if(left<=0){
      // Recomputa isLastEx e isLastRound DENTRO do effect com valores atuais
      const lastEx=exIdx===TABATA_EX.length-1;
      const lastRound=round===ROUNDS;
      if(phase==="work"){
        beep(440,150);
        if(lastEx&&lastRound){setPhase("done");return;}
        if(lastEx){setPhase("roundRest");setLeft(ROUND_REST);}
        else{setPhase("rest");setLeft(REST);}
      }else if(phase==="rest"){
        beep(880,200);
        // FIX: bounds check antes de incrementar
        setExIdx(i=>Math.min(i+1,TABATA_EX.length-1));
        setPhase("work");setLeft(WORK);
      }else if(phase==="roundRest"){
        beep(880,300);
        setRound(r=>Math.min(r+1,ROUNDS));
        setExIdx(0);setPhase("work");setLeft(WORK);
      }
      return;
    }
    if(left<=3&&left>0)beep(660,80);
    const t=setTimeout(()=>setLeft(l=>l-1),1000);
    return()=>clearTimeout(t);
  },[left,phase,exIdx,round]); // FIX: deps completas

  const startTabata=()=>{
    beep(880,200);
    setPhase("work");setLeft(WORK);setRound(1);setExIdx(0);setTotalTime(0);
  };

  const phaseColor=phase==="work"?"#ff4d4d":phase==="rest"||phase==="roundRest"?"#4dffa0":"#ff9f43";
  const circ=2*Math.PI*54;
  const maxTime=phase==="work"?WORK:phase==="rest"?REST:ROUND_REST;
  const dash=circ*(Math.max(left,0)/maxTime);

  const NAV=[["home","Início",<I.home/>],["diet","Dieta",<I.diet/>],["rewards","Conquistas",<I.trophy/>],["profile","Perfil",<I.user/>]];

  if(phase==="intro"){
    return(
      <div className="screen tabata" style={{background:"var(--bg)"}}>
        <div style={{flexShrink:0,background:"linear-gradient(135deg,rgba(255,159,67,.15),rgba(255,159,67,.05),var(--bg))",borderBottom:"1px solid var(--br)",padding:"max(env(safe-area-inset-top),14px) 16px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <button className="back-btn" onClick={onBack}><I.back/></button>
            <div>
              <div style={{fontFamily:"Space Mono",fontSize:9,color:"#ff9f43",letterSpacing:2,textTransform:"uppercase"}}>Sábado · Tabata</div>
              <div style={{fontFamily:"Bebas Neue",fontSize:32,letterSpacing:2,color:"#ff9f43",lineHeight:1}}>ABDOMINAL</div>
            </div>
          </div>
        </div>
        <div className="pg" style={{padding:"20px 16px"}}>
          <div style={{background:"linear-gradient(135deg,rgba(255,159,67,.1),rgba(255,159,67,.03))",border:"1px solid rgba(255,159,67,.3)",borderRadius:16,padding:20,marginBottom:18,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:8}}>🔥</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:26,letterSpacing:2,color:"#ff9f43",marginBottom:8}}>PROTOCOLO TABATA</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {[["20s","Execução"],["10s","Descanso"],["8","Exercícios"],["3x","Rounds"]].map(([v,l])=>(

                  <div style={{fontFamily:"Bebas Neue",fontSize:26,color:"#ff9f43",lineHeight:1}}>{v}</div>
                  <div style={{fontSize:10,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:12,color:"var(--mu)"}}>2 minutos de descanso entre cada round</div>
          </div>
          <div className="stl">Sequência de exercícios</div>
          {TABATA_EX.map((e,i)=>(
            <div key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"var(--s1)",border:"1px solid var(--br)",borderRadius:12,marginBottom:6}}>
              <div style={{fontFamily:"Bebas Neue",fontSize:20,color:"#ff9f43",width:24,textAlign:"center",lineHeight:1}}>{i+1}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{e.n}</div></div>

              </a>
            </div>
          ))}
          <div style={{height:16}}/>

      </div>
    );
  }

  if(phase==="done"){
    return(
      <div className="screen tabata" style={{background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{fontSize:64,marginBottom:16}}>🏆</div>
        <div style={{fontFamily:"Bebas Neue",fontSize:48,letterSpacing:3,color:"#ff9f43",textAlign:"center",marginBottom:8}}>ARRASOU!</div>
        <div style={{fontSize:16,color:"var(--mu)",textAlign:"center",marginBottom:8}}>3 rounds · {TABATA_EX.length} exercícios</div>

        <button onClick={onFinish} style={{width:"100%",maxWidth:300,padding:18,borderRadius:14,border:"none",background:"linear-gradient(135deg,#ff9f43,#ff6b35)",color:"#000",fontWeight:800,fontSize:16,cursor:"pointer",fontFamily:"DM Sans",marginBottom:12}}>
          ✅ Finalizar e salvar
        </button>
        <button onClick={onBack} style={{width:"100%",maxWidth:300,padding:14,borderRadius:12,border:"1px solid var(--br)",background:"var(--s2)",color:"var(--mu)",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"DM Sans"}}>
          Voltar
        </button>
      </div>
    );
  }

  return(
    <div className="screen tabata" style={{background:phase==="roundRest"||phase==="rest"?"#0a1a0a":"#0e0505",display:"flex",flexDirection:"column"}}>
      <div style={{flexShrink:0,padding:"max(env(safe-area-inset-top),14px) 16px 12px",borderBottom:"1px solid var(--br)",display:"flex",alignItems:"center",gap:12}}>
        <button className="back-btn" onClick={onBack}><I.back/></button>
        <div style={{flex:1}}>
          <div style={{fontFamily:"Space Mono",fontSize:9,color:"var(--mu)",letterSpacing:2}}>ROUND {round}/{ROUNDS} · EX {safeIdx+1}/{TABATA_EX.length}</div>
        </div>
        <div style={{fontFamily:"Space Mono",fontSize:12,color:"var(--mu)"}}>{fmt(totalTime)}</div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 20px"}}>
        {phase==="roundRest"?(
          <>
            <div style={{fontSize:40,marginBottom:16}}>😮‍💨</div>
            <div style={{fontFamily:"Space Mono",fontSize:16,color:"#4dffa0",letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>DESCANSE</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:26,color:"var(--tx)",marginBottom:4}}>Próximo round em</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:100,lineHeight:1,color:"#4dffa0"}}>{left}</div>
            {round<ROUNDS&&<div style={{fontSize:13,color:"var(--mu)",marginTop:8}}>Round {round+1} começa em breve</div>}
          </>
        ):(
          <>
            <div style={{fontFamily:"Space Mono",fontSize:13,color:phaseColor,letterSpacing:4,textTransform:"uppercase",marginBottom:4}}>{phase==="work"?"EXECUTE!":"RESPIRE"}</div>
            <div className="tabata-ring">
              <svg style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}} viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="54" fill="none" stroke="#1a1a1a" strokeWidth="8"/>
                <circle cx="60" cy="60" r="54" fill="none" stroke={phaseColor} strokeWidth="8"
                  strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
                  style={{transition:"stroke-dasharray .95s linear"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontFamily:"Bebas Neue",fontSize:80,lineHeight:1,color:phaseColor}}>{left}</div>
                <div style={{fontSize:10,color:"var(--mu)",fontFamily:"Space Mono",letterSpacing:2}}>{phase==="work"?"segundos":"descanso"}</div>
              </div>
            </div>
            <div style={{fontFamily:"Bebas Neue",fontSize:32,letterSpacing:2,textAlign:"center",lineHeight:1.1,color:phase==="work"?"var(--tx)":"var(--mu)",marginBottom:8}}>{ex.n}</div>
            {phase==="work"&&<div style={{fontSize:11,color:"var(--mu)",textAlign:"center",maxWidth:280,lineHeight:1.5}}>{ex.tip.slice(0,90)}...</div>}
            {phase==="rest"&&safeIdx<TABATA_EX.length-1&&(
              <div style={{textAlign:"center",marginTop:8}}>
                <div style={{fontSize:10,color:"var(--mu)",textTransform:"uppercase",letterSpacing:1}}>Próximo</div>
                <div style={{fontSize:16,fontWeight:700,color:"#4dffa0",marginTop:2}}>{nextEx.n}</div>
              </div>
            )}
          </>
        )}
      </div>
      <div style={{flexShrink:0,padding:"12px 16px",borderTop:"1px solid var(--br)"}}>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:8}}>
          {TABATA_EX.map((_,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:"50%",background:i<safeIdx?"var(--acc)":i===safeIdx?phaseColor:"var(--br)",transition:"background .3s"}}/>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          {Array.from({length:ROUNDS},(_,i)=>(
            <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<round-1?"var(--acc)":i===round-1?phaseColor:"var(--br)"}}/>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── MINI CHART ───────────────────────────────────────────────────────────────
function MiniChart({logs}){
  const pts=logs.slice(0,8).reverse().map(l=>({kg:parseFloat(l.sets?.[0]?.kg||0),d:l.date?.split(",")[0]||""})).filter(p=>p.kg>0);
  if(pts.length<2)return<div style={{textAlign:"center",color:"var(--mu)",padding:"18px 0",fontSize:13}}>Registre 2+ sessões para ver a evolução 📈</div>;
  const max=Math.max(...pts.map(p=>p.kg));
  return(
    <div style={{background:"var(--s2)",borderRadius:12,padding:"12px 12px 8px"}}>
      <div className="bar-chart">
        {pts.map((p,i)=>(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{fontSize:8,color:"var(--acc)",fontFamily:"Space Mono",fontWeight:700,whiteSpace:"nowrap"}}>{p.kg}</div>
            <div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end"}}>
              <div className="b-bar" style={{width:"100%",height:`${Math.max((p.kg/max)*52,4)}px`,background:"linear-gradient(180deg,var(--acc),rgba(200,241,53,.25))"}}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:4}}>
        {pts.map((p,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:8,color:"var(--mu)",fontFamily:"Space Mono"}}>{p.d.slice(0,5)}</div>)}
      </div>
    </div>
  );
}

// ─── EXERCISE DETAIL ──────────────────────────────────────────────────────────
function ExDetail({ex,wid,wrest,onBack,goTab,dark}){
  const[tab,setTab]=useState("log");
  const[logs,setLogs]=useLS(`lg_${wid}_${ex.id}`,[]);
  const[sets,setSets]=useState([{r:"",kg:""},{r:"",kg:""},{r:"",kg:""}]);
  const[note,setNote]=useState("");
  const[toast,setToast]=useState({show:false,msg:"",err:false});
  const[showTimer,setShowTimer]=useState(false);
  const[restSec,setRestSec]=useState(wrest||90);

  const t2=(msg,err=false)=>{setToast({show:true,msg,err});setTimeout(()=>setToast(v=>({...v,show:false})),2400);};

  const save=()=>{
    const v=sets.filter(s=>s.r||s.kg);
    if(!v.length&&!note){t2("⚠️ Preencha ao menos uma série",true);return;}
    setLogs(l=>[{date:new Date().toLocaleString("pt-BR"),sets:v,note,ts:Date.now()},...l]);
    setSets([{r:"",kg:""},{r:"",kg:""},{r:"",kg:""}]);
    setNote("");
    t2("✅ Progressão salva!");
    setShowTimer(true);
  };

  const sug=suggest(logs);
  const last=logs[0];
  const oneRM=last?.sets?.[0]?.r&&last?.sets?.[0]?.kg?rm1(parseInt(last.sets[0].r),parseFloat(last.sets[0].kg)):null;
  const col=TC[ex.type]||"var(--acc)";
  const bg=dark?"#000":"var(--bg)";
  const emo=ex.type==="abs"?"🔥":ex.type==="legs"||ex.type==="lower"?"🦵":ex.type==="pull"?"💪":"🏋️";
  const NAV=[["home","Início",<I.home/>],["diet","Dieta",<I.diet/>],["rewards","Conquistas",<I.trophy/>],["profile","Perfil",<I.user/>]];

  return(
    <div className="screen ex" style={{background:bg}}>
      <Toast msg={toast.msg} show={toast.show} err={toast.err}/>
      {showTimer&&<RestTimer sec={restSec} onDone={()=>setShowTimer(false)} onSkip={()=>setShowTimer(false)}/>}
      <div style={{flexShrink:0,background:`linear-gradient(135deg,${col}18,${col}06,${bg})`,borderBottom:"1px solid var(--br)",padding:"max(env(safe-area-inset-top),14px) 16px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <button className="back-btn" onClick={onBack}><I.back/></button>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontFamily:"Space Mono",color:col,letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>{ex.s} séries · {ex.r} reps</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:24,letterSpacing:1.5,lineHeight:1.1}}>{ex.n}</div>
          </div>
          <div style={{fontSize:36}}>{emo}</div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {ex.nt&&<span style={{background:`${col}15`,border:`1px solid ${col}40`,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,color:col}}>{ex.nt}</span>}
          {oneRM&&<span style={{background:"rgba(100,150,255,.12)",border:"1px solid rgba(100,150,255,.3)",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,color:"#6496ff"}}>1RM ≈ {oneRM}kg</span>}
          {last&&<span style={{background:"rgba(77,255,160,.1)",border:"1px solid rgba(77,255,160,.25)",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,color:"var(--grn)"}}>Último: {last.sets[0]?.kg||"—"}kg</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:10,color:"var(--mu)",fontFamily:"Space Mono"}}>Timer de descanso</span>
          <div style={{display:"flex",gap:5}}>
            {[30,45,60,90,120].map(s=>(
              <button key={s} onClick={()=>setRestSec(s)} style={{padding:"3px 8px",borderRadius:7,border:`1px solid ${restSec===s?"var(--acc)":"var(--br)"}`,background:restSec===s?"rgba(200,241,53,.1)":"var(--s2)",color:restSec===s?"var(--acc)":"var(--mu)",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"Space Mono"}}>{s}s</button>
            ))}
          </div>
        </div>
      </div>
      <div className="pg">
        <div style={{padding:"12px 16px 32px"}}>
          {sug&&<div className="suggest"><span style={{fontSize:18}}>🤖</span><span style={{fontSize:13,color:"var(--acc)",fontWeight:500,lineHeight:1.4}}>{sug}</span></div>}
          <div className="tip-box">{ex.tip}</div>
          {ex.yt&&<a href={ex.yt} target="_blank" rel="noopener noreferrer"
            style={{display:"flex",alignItems:"center",gap:10,background:"linear-gradient(135deg,#cc0000,#ff1a1a)",color:"#fff",borderRadius:13,padding:"13px 18px",marginBottom:14,textDecoration:"none",fontWeight:700,fontSize:14,justifyContent:"center",fontFamily:"DM Sans"}}>
            <div style={{width:26,height:26,background:"#fff",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}>{I.yt(16,"#cc0000")}</div>
            Ver execução no YouTube
          </a>}
          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {[["log","✏️","Registrar"],["chart","📈","Evolução"],["subs","🔄","Substituir"],["hist","📊","Histórico"]].map(([id,em,lb])=>(
              <button key={id} className={`tab-btn${tab===id?" on":""}`} onClick={()=>setTab(id)}>
                <span style={{fontSize:14}}>{em}</span>{lb}
              </button>
            ))}
          </div>
          {tab==="log"&&<div className="su">
            <div style={{background:"var(--s1)",border:"1px solid var(--br)",borderRadius:14,padding:16,marginBottom:14}}>
              <div className="stl">Registrar séries</div>
              {sets.map((s,i)=>(
                <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:11,fontWeight:700,color:"var(--mu)",width:32,fontFamily:"Space Mono"}}>S{i+1}</span>
                  <input className="si" type="number" placeholder="Reps" value={s.r} onChange={e=>setSets(a=>a.map((x,j)=>j===i?{...x,r:e.target.value}:x))} inputMode="numeric"/>
                  <span style={{fontSize:13,color:"var(--mu)",textAlign:"center",width:14}}>×</span>
                  <input className="si" type="number" placeholder="Kg" value={s.kg} onChange={e=>setSets(a=>a.map((x,j)=>j===i?{...x,kg:e.target.value}:x))} inputMode="decimal"/>
                  <span style={{fontSize:11,color:"var(--mu)",width:20}}>kg</span>
                  {sets.length>1&&<button onClick={()=>setSets(a=>a.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"var(--mu)",cursor:"pointer",fontSize:18,padding:"0 2px"}}>×</button>}
                </div>
              ))}
              <button onClick={()=>setSets(a=>[...a,{r:"",kg:""}])} style={{width:"100%",padding:9,borderRadius:10,border:"1px dashed var(--br)",background:"transparent",color:"var(--mu)",fontSize:13,cursor:"pointer",fontFamily:"DM Sans",marginTop:2}}>+ Adicionar série</button>
            </div>
            <div style={{marginBottom:14}}>
              <div className="stl">Anotação livre</div>
              <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Ex: boa execução, aumentar carga próxima..." style={{height:68}}/>
            </div>
            <button className="btn-acc" onClick={save}>💾 Salvar + Timer {restSec}s</button>
          </div>}
          {tab==="chart"&&<div className="su">
            <div className="stl">Evolução da carga (série 1)</div>
            <MiniChart logs={logs}/>
            {oneRM&&<div style={{background:"var(--s1)",border:"1px solid var(--br)",borderRadius:14,padding:16,marginTop:12,textAlign:"center"}}>
              <div className="stl">1RM estimado (Epley)</div>
              <div style={{fontFamily:"Bebas Neue",fontSize:52,color:"var(--acc)",lineHeight:1}}>{oneRM}<span style={{fontSize:22}}>kg</span></div>
            </div>}
          </div>}
          {tab==="subs"&&<div className="su">
            <div className="stl">Exercícios substitutos</div>
            {ex.sub?.map((s,i)=>(
              <div key={i} style={{background:"var(--s2)",borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid var(--br)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:18}}>🔄</span><span style={{fontSize:14,fontWeight:600}}>{s}</span>
                </div>
                <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(s+" execução musculação")}`} target="_blank" rel="noopener noreferrer"
                  style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,0,0,.1)",border:"1px solid rgba(255,0,0,.2)",color:"#ff5555",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,textDecoration:"none"}}>
                  {I.yt(14,"#ff5555")} Ver execução
                </a>
              </div>
            ))}
          </div>}
          {tab==="hist"&&<div className="su">
            <div className="stl">Histórico de cargas</div>
            {!logs.length?<div style={{textAlign:"center",color:"var(--mu)",padding:"28px 0",fontSize:13}}>Nenhum registro ainda. Comece! 💪</div>
              :logs.map((l,i)=>(
                <div key={i} style={{background:"var(--s2)",borderRadius:10,padding:"11px 14px",marginBottom:8}}>
                  <div style={{fontFamily:"Space Mono",fontSize:10,color:"var(--acc)",marginBottom:5}}>{l.date}</div>
                  {l.sets?.map((s,j)=><div key={j} style={{fontSize:13}}>Série {j+1}: <strong style={{color:"var(--acc)"}}>{s.r||"?"}×{s.kg||"?"}kg</strong></div>)}
                  {l.note&&<div style={{color:"var(--mu)",fontSize:12,marginTop:4,fontStyle:"italic"}}>📝 {l.note}</div>}
                </div>
              ))
            }
          </div>}
        </div>
      </div>
      <div className="nav">{NAV.map(([id,lb,ic])=><button key={id} className="nb" onClick={()=>goTab(id)}>{ic}{lb}</button>)}</div>
    </div>
  );
}

// ─── WORKOUT SCREEN ───────────────────────────────────────────────────────────
function WkScreen({wk,onBack,onFinish,goTab}){
  const sessionKey=useRef(`done_${wk.id}_${new Date().toDateString()}`).current;
  const[done,setDone]=useState(()=>lsGet(sessionKey,[]));
  const[selEx,setSelEx]=useState(null);
  const[dark,setDark]=useLS("dark_wk",false);
  const[showConfirm,setShowConfirm]=useState(false);
  const[showTabata,setShowTabata]=useState(false);

  const saveDone=v=>{setDone(v);lsSet(sessionKey,v);};
  // FIX #10: pct usa 0 quando ex está vazio para evitar NaN
  const pct=wk.ex.length>0?done.length/wk.ex.length:0;
  const col=TC[wk.type]||"var(--acc)";
  const bg=dark?"#000":"var(--bg)";
  const s1=dark?"#090909":"var(--s1)";

  const handleFinish=()=>{
    lsDel(sessionKey);
    setDone([]);
    onFinish(wk);
  };

  if(wk.tabata&&showTabata){
    return<TabataScreen onBack={()=>setShowTabata(false)} onFinish={handleFinish} goTab={goTab}/>;
  }
  if(selEx)return<ExDetail ex={{...selEx,type:wk.type}} wid={wk.id} wrest={wk.rest||90} onBack={()=>setSelEx(null)} goTab={goTab} dark={dark}/>;

  const NAV=[["home","Início",<I.home/>],["diet","Dieta",<I.diet/>],["rewards","Conquistas",<I.trophy/>],["profile","Perfil",<I.user/>]];

  return(
    <div className="screen wk" style={{background:bg}}>
      {showConfirm&&ReactDOM.createPortal(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:9998,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 16px 32px"}} onClick={()=>setShowConfirm(false)}>
          <div style={{background:"var(--s1)",borderRadius:20,padding:24,width:"100%",maxWidth:398,border:"1px solid var(--br)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"Bebas Neue",fontSize:26,letterSpacing:2,marginBottom:8}}>Finalizar treino?</div>
            <div style={{fontSize:14,color:"var(--mu)",marginBottom:20}}>
              {pct>=0.99?"Treino 100% concluído! Incrível 🏆":`Você completou ${Math.round(pct*100)}% do treino. Tem certeza?`}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowConfirm(false)} style={{flex:1,padding:14,borderRadius:12,border:"1px solid var(--br)",background:"var(--s2)",color:"var(--mu)",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"DM Sans"}}>Continuar</button>
              <button onClick={handleFinish} style={{flex:2,padding:14,borderRadius:12,border:"none",background:`linear-gradient(135deg,${col},${col}aa)`,color:"#000",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"DM Sans"}}>
                {pct>=0.99?"🏆 Finalizar":"Encerrar mesmo assim"}
              </button>
            </div>
          </div>
        </div>,
        document.body
      )}
      {/* HEADER */}
      <div style={{flexShrink:0,background:`linear-gradient(160deg,${col}22,${col}08,${bg})`,borderBottom:"1px solid var(--br)",padding:"max(env(safe-area-inset-top),14px) 16px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <button className="back-btn" onClick={onBack}><I.back/></button>
          <div style={{flex:1}}>
            <div style={{fontFamily:"Space Mono",fontSize:10,color:col,letterSpacing:2,textTransform:"uppercase"}}>{wk.label}</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:38,letterSpacing:3,lineHeight:1,color:col}}>{wk.name}</div>
          </div>
          <button onClick={()=>setDark(d=>!d)} style={{width:36,height:36,borderRadius:10,background:dark?"rgba(200,241,53,.1)":s1,border:`1px solid ${dark?"var(--acc)":"var(--br)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:dark?"var(--acc)":"var(--mu)"}}>
            {dark?<I.sun/>:<I.moon/>}
          </button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{fontSize:13,color:"var(--mu)"}}>{wk.ex.length} exercícios</div>
          <div style={{width:3,height:3,borderRadius:"50%",background:"var(--br)"}}/>
          <div style={{fontSize:13,color:col,fontWeight:600}}>{done.length} concluídos</div>
        </div>
        <div style={{height:4,background:"var(--br)",borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",background:`linear-gradient(90deg,${col},${col}99)`,borderRadius:4,width:`${pct*100}%`,transition:"width .4s"}}/>
        </div>
      </div>
      {/* CORPO */}
      {wk.tabata?(
        <div className="pg" style={{padding:"16px"}}>
          <div style={{background:"linear-gradient(135deg,rgba(255,159,67,.1),rgba(255,159,67,.03))",border:"1px solid rgba(255,159,67,.3)",borderRadius:16,padding:20,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:8}}>🔥</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:22,color:"#ff9f43",letterSpacing:2,marginBottom:4}}>MODO TABATA</div>
            <div style={{fontSize:13,color:"var(--mu)",marginBottom:16}}>20s execução · 10s descanso · 3 rounds · {wk.ex.length} exercícios</div>
            <button onClick={()=>setShowTabata(true)} style={{width:"100%",padding:18,borderRadius:14,border:"none",background:"linear-gradient(135deg,#ff9f43,#ff6b35)",color:"#000",fontWeight:800,fontSize:16,cursor:"pointer",fontFamily:"DM Sans"}}>
              🔥 INICIAR TABATA
            </button>
          </div>
          <div className="stl">Sequência de exercícios</div>
          {wk.ex.map((ex,i)=>(
            <div key={ex.id} className="ex-row" onClick={()=>setSelEx(ex)}>
              <div style={{fontFamily:"Bebas Neue",fontSize:22,color:"#ff9f43",lineHeight:1,width:28,flexShrink:0,textAlign:"center"}}>{i+1}</div>

                <div style={{fontSize:14,fontWeight:600}}>{ex.n}</div>
                <div style={{fontSize:11,color:"var(--mu)",marginTop:2}}>20s · ver detalhes</div>
              </div>
              <I.arr/>
            </div>
          ))}
          <div style={{height:12}}/>
        </div>
      ):(
        <div className="pg" style={{padding:"12px 16px 0"}}>
          {wk.ex.map((ex,i)=>{
            let has=false;try{const lg=lsGet(`lg_${wk.id}_${ex.id}`,[]);has=lg.length>0;}catch{}
            // FIX #11: `dn?0.65:1` explícito para evitar ambiguidade de parsing com ?.
            const dn=done.includes(ex.id);
            return(
              <div key={ex.id} className="ex-row" style={{opacity:dn?0.65:1,background:dn?s1:"var(--s1)"}} onClick={()=>setSelEx(ex)}>

                  <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:has?"var(--acc)":"var(--br)"}}/>
                    <span style={{fontSize:10,color:"var(--mu)"}}>{has?"Carga registrada":"Sem registro"}</span>
                  </div>
                </div>
                <div className={`ex-chk${dn?" on":""}`} onClick={e=>{e.stopPropagation();const next=dn?done.filter(x=>x!==ex.id):[...done,ex.id];saveDone(next);}}>
                  {dn&&<I.chk/>}
                </div>
              </div>
            );
          })}
          <button onClick={()=>setShowConfirm(true)}
            style={{width:"100%",padding:18,margin:"8px 0",borderRadius:14,border:pct>=0.99?"none":"1px solid var(--br)",background:pct>=0.99?`linear-gradient(135deg,${col},${col}aa)`:"var(--s2)",color:pct>=0.99?"#000":"var(--mu)",fontWeight:800,fontSize:15,letterSpacing:.5,textTransform:"uppercase",cursor:"pointer",fontFamily:"DM Sans",boxShadow:pct>=0.99?`0 0 28px ${col}55`:"none",transition:"all .3s"}}>
            {pct>=0.99?"🏆 Finalizar Treino":`Encerrar · ${Math.round(pct*100)}% completo`}
          </button>

        </div>
      )}
      <div className="nav">{NAV.map(([id,lb,ic])=><button key={id} className="nb" onClick={()=>goTab(id)}>{ic}{lb}</button>)}</div>
    </div>
  );
}

            <input type="number" value={rk} onChange={e=>setRk(e.target.value)} placeholder="Kg" inputMode="decimal"
              style={{flex:1,background:"var(--s2)",border:"1px solid var(--br)",borderRadius:9,padding:"11px 10px",color:"var(--tx)",fontSize:15,fontFamily:"DM Sans",textAlign:"center",fontWeight:600}}/>
          </div>
          {oneRM?<div style={{textAlign:"center",padding:"6px 0"}}>
            <div style={{fontSize:10,color:"var(--mu)",fontFamily:"Space Mono",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Seu 1RM estimado</div>
            <div style={{fontFamily:"Bebas Neue",fontSize:56,color:"var(--acc)",lineHeight:1}}>{oneRM}<span style={{fontSize:22}}>kg</span></div>

          </div>:<div style={{textAlign:"center",color:"var(--mu)",fontSize:13}}>Digite reps e kg para calcular</div>}
        </div>
        <div className="stl">Conquistas</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {BADGES.map(b=>{const u=b.ok(total,streak);return(
            <div key={b.id} className={`badge-c${u?" unl":" lock"}`}>
              <div style={{fontSize:28}}>{b.ic}</div>
              <div style={{fontSize:11,fontWeight:700}}>{b.name}</div>
              <div style={{fontSize:10,color:"var(--mu)"}}>{b.desc}</div>
              {u&&<div style={{fontSize:9,color:"var(--gold)",fontWeight:700}}>✨ DESBLOQUEADO</div>}
            </div>
          );})}
        </div>
        <div className="stl">Medidas corporais</div>
        <div style={{background:"var(--s1)",border:"1px solid var(--br)",borderRadius:14,padding:14,marginBottom:12}}>
          {[["Peso","weight","kg"],["Cintura","waist","cm"],["Peito","chest","cm"],["Braço","arm","cm"]].map(([l,k,u])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--br)"}}>
              <span style={{fontSize:13,color:"var(--mu)"}}>{l}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="number" value={stats[k]} onChange={e=>setStats(p=>({...p,[k]:e.target.value}))} inputMode="decimal" placeholder="—"
                  style={{background:"var(--s2)",border:"1px solid var(--br)",borderRadius:8,padding:"6px 9px",color:"var(--tx)",fontSize:14,fontFamily:"DM Sans",width:68,textAlign:"center"}}/>
                <span style={{fontSize:11,color:"var(--mu)",width:26}}>{u}</span>
              </div>
            </div>
          ))}
          <button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}} className="btn-acc" style={{marginTop:12}}>
            {saved?"✅ Salvo!":"Salvar medidas"}
          </button>
        </div>
        <div className="stl">Fotos de progresso</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <div className="ph-slot" onClick={()=>fRef.current?.click()}><span style={{fontSize:22}}>📸</span><span>Adicionar</span></div>
          <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={addPh}/>
          {photos.map((p,i)=>(
            <div key={i} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",position:"relative",border:"1px solid var(--br)"}}>
              <img src={p.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.7)",fontSize:7,color:"#fff",padding:"3px 5px",fontFamily:"Space Mono"}}>{p.date}</div>
            </div>
          ))}
        </div>
        <div style={{background:"linear-gradient(135deg,#0a1400,#080808)",border:"1px solid rgba(200,241,53,.15)",borderRadius:14,padding:16,marginBottom:20,textAlign:"center"}}>
          <div style={{fontSize:9,color:"var(--acc)",fontFamily:"Space Mono",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Meta Principal</div>
          <div style={{fontFamily:"Bebas Neue",fontSize:28}}>🎯 SHAPE AGOSTO 2026</div>
          <div style={{fontSize:13,color:"var(--mu)",marginTop:4}}>Continue assim. Você vai chegar lá.</div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("home");
  const[activeWk,setActiveWk]=useState(null);
  const[toast,setToast]=useState({show:false,msg:""});
  const[total,setTotal]=useLS("total_wk",0);
  const[streak,setStreak]=useLS("streak",0);
  const[lastD,setLastD]=useLS("last_d",null);
  const[trained,setTrained]=useLS("trained_dates",[]);

  // FIX: remove loading screen quando React monta
  useEffect(()=>{
    const el=document.getElementById("loading");
    if(el){el.style.transition="opacity .4s";el.style.opacity="0";setTimeout(()=>el.remove(),450);}
  },[]);

  const t2=msg=>{setToast({show:true,msg});setTimeout(()=>setToast(v=>({...v,show:false})),3000);};
  const goTab=t=>{setActiveWk(null);setTab(t);};

  const finish=w=>{
    const td=new Date().toDateString();
    setTotal(n=>n+1);
    if(lastD!==td){
      const y=new Date();y.setDate(y.getDate()-1);
      setStreak(s=>lastD===y.toDateString()?s+1:1);
      setLastD(td);
    }
    if(!trained.includes(td))setTrained(d=>[...d,td]);
    setActiveWk(null);
    t2(`🏆 +100 XP — ${w.name} concluído!`);
  };

  const tabs=[["home","Início",<I.home/>],["diet","Dieta",<I.diet/>],["rewards","Conquistas",<I.trophy/>],["profile","Perfil",<I.user/>]];

  return(
    <>
      <Toast msg={toast.msg} show={toast.show}/>
      {activeWk&&<WkScreen wk={activeWk} onBack={()=>setActiveWk(null)} onFinish={finish} goTab={goTab}/>}
      <div className="screen" style={{zIndex:activeWk?0:5}}>
        <div className="pg">
          {tab==="home"&&<HomeScreen onStart={setActiveWk} total={total} streak={streak}/>}
          {tab==="diet"&&<DietScreen/>}
          {tab==="rewards"&&<RewardsScreen total={total} streak={streak}/>}
          {tab==="profile"&&<ProfileScreen total={total}/>}
        </div>
        <nav className="nav">
          {tabs.map(([id,lb,ic])=>(
            <button key={id} className={`nb${tab===id?" on":""}`} onClick={()=>setTab(id)}>{ic}{lb}</button>
          ))}
        </nav>
      </div>
    </>
  );
}

// FIX: envolvido com ErrorBoundary
ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
